# ci-reusable.yml
#
# Callable workflow: typecheck, production build, unit tests, and optional DB
# integration. Used by ci.yml (PRs + non-main branches) and deploy.yml (main).
#
# Integration requires Supabase secrets; callers pass run-integration: false for
# fork PRs (secrets are unavailable and would fail).

name: CI (reusable)

on:
  workflow_call:
    inputs:
      run-integration:
        description: Whether to run DB integration tests
        type: boolean
        required: true

permissions:
  contents: read

jobs:
  fast-checks:
    name: Type check, build, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          ANTHROPIC_API_KEY: "placeholder-anthropic-key"
          CRON_SECRET: "placeholder-cron-secret"
      - run: npx tsx scripts/test-sudoku.ts
      - run: npx tsx scripts/test-word-search.ts
      - run: npx tsx scripts/test-killer-nonogram.ts
      - run: npx tsx scripts/test-citations.ts

  integration:
    name: DB integration tests
    if: inputs.run-integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsx scripts/test-dedup.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: npx tsx scripts/test-url-dedup.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
