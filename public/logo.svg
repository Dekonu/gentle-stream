    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(67.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(75,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(82.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(90,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(97.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(105,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(112.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(120,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(127.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(135,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(142.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(150,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(157.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(165,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(172.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(180,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(187.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(195,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(202.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(210,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(217.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(225,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(232.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(240,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(247.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(255,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(262.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(270,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(277.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(285,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(292.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(300,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(307.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(315,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(322.5,512,512)"/>
