    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(337.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(345,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(352.5,512,512)"/>
  </g>

  <!-- Larger accent ticks at cardinal and intercardinal points -->
  <g stroke="#c9a84c" stroke-width="2.5">
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(0,512,512)"/>
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(45,512,512)"/>
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(90,512,512)"/>
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(135,512,512)"/>
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(180,512,512)"/>
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(225,512,512)"/>
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(270,512,512)"/>
    <line x1="512" y1="56" x2="512" y2="78" transform="rotate(315,512,512)"/>
  </g>

  <!-- Gold outer ring hairline -->
  <circle cx="512" cy="512" r="452" fill="none" stroke="url(#goldLine)" stroke-width="1.5" opacity="0.7"/>

  <!-- ── Mid band – slightly lighter green ── -->
  <circle cx="512" cy="512" r="438" fill="#1d5233"/>

  <!-- Gold accent ring -->
  <circle cx="512" cy="512" r="435" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <circle cx="512" cy="512" r="430" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>

  <!-- ── Newsprint inner field ── -->
  <circle cx="512" cy="512" r="422" fill="url(#innerpaper)"/>

  <!-- Fine inner border rings -->
  <circle cx="512" cy="512" r="418" fill="none" stroke="#1a472a" stroke-width="3.5"/>
  <circle cx="512" cy="512" r="412" fill="none" stroke="#1a472a" stroke-width="1"/>
  <circle cx="512" cy="512" r="408" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.45"/>

  <!-- ── Decorative corner ornament clusters (4 positions) ── -->
  <!-- Top -->
  <g transform="translate(512,118)" fill="#1a472a" opacity="0.55">
    <polygon points="0,-9 2.8,0 -2.8,0" />
    <polygon points="-14,-4 -11.2,4.5 -16.8,4.5" />
    <polygon points="14,-4 11.2,4.5 16.8,4.5" />
    <rect x="-18" y="6" width="36" height="1.2" rx="0.6"/>
  </g>
  <!-- Bottom -->
  <g transform="translate(512,906) rotate(180)" fill="#1a472a" opacity="0.55">
    <polygon points="0,-9 2.8,0 -2.8,0" />
    <polygon points="-14,-4 -11.2,4.5 -16.8,4.5" />
    <polygon points="14,-4 11.2,4.5 16.8,4.5" />
    <rect x="-18" y="6" width="36" height="1.2" rx="0.6"/>
  </g>
  <!-- Left -->
  <g transform="translate(118,512) rotate(-90)" fill="#1a472a" opacity="0.55">
    <polygon points="0,-9 2.8,0 -2.8,0" />
    <polygon points="-14,-4 -11.2,4.5 -16.8,4.5" />
    <polygon points="14,-4 11.2,4.5 16.8,4.5" />
    <rect x="-18" y="6" width="36" height="1.2" rx="0.6"/>
  </g>
  <!-- Right -->
  <g transform="translate(906,512) rotate(90)" fill="#1a472a" opacity="0.55">
    <polygon points="0,-9 2.8,0 -2.8,0" />
    <polygon points="-14,-4 -11.2,4.5 -16.8,4.5" />
    <polygon points="14,-4 11.2,4.5 16.8,4.5" />
    <rect x="-18" y="6" width="36" height="1.2" rx="0.6"/>
  </g>

  <!-- ── Blackletter G ── -->
  <text
    x="512"
    y="646"
    font-family="UnifrakturMaguntia, 'Palatino Linotype', serif"
    font-size="524"
    fill="#1a472a"
    text-anchor="middle"
    dominant-baseline="auto"
    filter="url(#letterShadow)"
    letter-spacing="-4">G</text>

  <!-- ── Stream waves – primary ── -->
  <path d="M276 750 Q390 778 512 762 Q634 746 748 770" fill="none" stroke="#1a472a" stroke-width="5" stroke-linecap="round"/>

  <!-- Gold highlight on primary wave -->
  <path d="M276 750 Q390 778 512 762 Q634 746 748 770" fill="none" stroke="url(#waveGold)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

  <!-- Stream wave 2 – faded -->
  <path d="M302 774 Q406 798 512 784 Q618 770 722 794" fill="none" stroke="#1a472a" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Stream wave 3 – faintest -->
  <path d="M326 795 Q420 815 512 803 Q604 791 698 811" fill="none" stroke="#1a472a" stroke-width="1.8" stroke-linecap="round" opacity="0.2"/>

  <!-- ── Horizontal rule lines flanking waves ── -->
  <line x1="200" y1="736" x2="812" y2="736" stroke="#1a472a" stroke-width="1" opacity="0.2"/>
  <line x1="240" y1="820" x2="784" y2="820" stroke="#1a472a" stroke-width="0.8" opacity="0.15"/>

  <!-- ── Small dot accents beside wave endpoints ── -->
  <circle cx="268" cy="750" r="3.5" fill="#1a472a" opacity="0.4"/>
  <circle cx="756" cy="770" r="3.5" fill="#1a472a" opacity="0.4"/>
  <circle cx="294" cy="774" r="2.5" fill="#1a472a" opacity="0.25"/>
  <circle cx="730" cy="794" r="2.5" fill="#1a472a" opacity="0.25"/>

  <!-- ── Subtle paper texture overlay (crosshatch) ── -->
  <g clip-path="url(#innerClip)" opacity="0.028" stroke="#5a4020" stroke-width="0.7">
    <line x1="100" y1="100" x2="924" y2="924"/>
    <line x1="150" y1="100" x2="924" y2="874"/>
    <line x1="200" y1="100" x2="924" y2="824"/>
    <line x1="250" y1="100" x2="924" y2="774"/>
    <line x1="300" y1="100" x2="924" y2="724"/>
    <line x1="350" y1="100" x2="924" y2="674"/>
    <line x1="400" y1="100" x2="924" y2="624"/>
    <line x1="450" y1="100" x2="924" y2="574"/>
    <line x1="500" y1="100" x2="924" y2="524"/>
    <line x1="550" y1="100" x2="924" y2="474"/>
    <line x1="600" y1="100" x2="924" y2="424"/>
    <line x1="650" y1="100" x2="924" y2="374"/>
    <line x1="700" y1="100" x2="924" y2="324"/>
    <line x1="750" y1="100" x2="924" y2="274"/>
    <line x1="800" y1="100" x2="924" y2="224"/>
    <line x1="850" y1="100" x2="924" y2="174"/>
    <line x1="100" y1="150" x2="874" y2="924"/>
    <line x1="100" y1="200" x2="824" y2="924"/>
    <line x1="100" y1="250" x2="774" y2="924"/>
    <line x1="100" y1="300" x2="724" y2="924"/>
    <line x1="100" y1="350" x2="674" y2="924"/>
    <line x1="100" y1="400" x2="624" y2="924"/>
    <line x1="100" y1="450" x2="574" y2="924"/>
    <line x1="100" y1="500" x2="524" y2="924"/>
    <line x1="100" y1="550" x2="474" y2="924"/>
    <line x1="100" y1="600" x2="424" y2="924"/>
    <line x1="100" y1="650" x2="374" y2="924"/>
    <line x1="100" y1="700" x2="324" y2="924"/>
