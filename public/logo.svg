<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- No external @import: browsers often block remote CSS when the SVG is used as an img src. -->
    <!-- Radial gradient for the outer ring - rich forest green -->
    <radialGradient id="outerGrad" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="55%" stop-color="#1a472a"/>
      <stop offset="100%" stop-color="#0d2b17"/>
    </radialGradient>

    <!-- Newsprint gradient for inner circle -->
    <radialGradient id="innerpaper" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fdfaf3"/>
      <stop offset="60%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ede6d4"/>
    </radialGradient>

    <!-- Subtle shadow for the G letterform -->
    <filter id="letterShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="6" flood-color="#0d2b17" flood-opacity="0.28"/>
    </filter>

    <!-- Outer glow for entire badge -->
    <filter id="badgeGlow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Emboss filter for ring details -->
    <filter id="emboss">
      <feConvolveMatrix order="3" kernelMatrix="-2 -1 0 -1 1 1 0 1 2" preserveAlpha="true"/>
    </filter>

    <!-- Gold shimmer gradient for decorative lines -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a472a" stop-opacity="0"/>
      <stop offset="20%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#e8c96a"/>
      <stop offset="80%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#1a472a" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold shimmer for wave accent -->
    <linearGradient id="waveGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a472a" stop-opacity="0"/>
      <stop offset="30%" stop-color="#b8973e"/>
      <stop offset="50%" stop-color="#d4af55"/>
      <stop offset="70%" stop-color="#b8973e"/>
      <stop offset="100%" stop-color="#1a472a" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip path for inner circle -->
    <clipPath id="innerClip">
      <circle cx="512" cy="512" r="418"/>
    </clipPath>
  </defs>

  <!-- ── Outer badge shadow ── -->
  <circle cx="512" cy="512" r="460" fill="rgba(0,0,0,0.18)" filter="url(#badgeGlow)"/>

  <!-- ── Outermost ring – deep forest green ── -->
  <circle cx="512" cy="512" r="458" fill="url(#outerGrad)"/>

  <!-- Decorative outer tick marks (48 ticks) -->
  <g stroke="#2d6a4f" stroke-width="1.5" opacity="0.6">
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(0,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(7.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(15,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(22.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(30,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(37.5,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(45,512,512)"/>
    <line x1="512" y1="58" x2="512" y2="72" transform="rotate(52.5,512,512)"/>
